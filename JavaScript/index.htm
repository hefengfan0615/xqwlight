<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>象棋小巫师 - Pikafish JS Engine</title>
  <style>
    body {
      background: #d4c5a9;
      margin: 0;
      padding: 10px;
    }

    span.td {
      display: inline-block;
    }

    div.label {
      font-size: 14px;
      padding: 2px;
    }

    select {
      font-size: 14px;
      width: 108px;
      padding: 2px;
    }

    option {
      font-size: 14px;
    }

    input.button {
      font-size: 14px;
      width: 108px;
      cursor: pointer;
    }

    label {
      font-size: 14px;
    }

    #boardCanvas {
      border: 2px solid #000;
      cursor: pointer;
    }

    #selMoveList {
      font-family: monospace;
      width: 130px;
    }

    .info {
      margin-top: 8px;
      font-size: 13px;
      color: #333;
    }

    .status {
      font-size: 16px;
      font-weight: bold;
      color: #c00;
      margin: 4px 0;
      height: 22px;
    }
  </style>
</head>
<body>
  <div style="text-align:center;font-size:28px;font-family:黑体,'SimHei',sans-serif">
    象棋小巫师
    <div style="font-size:12px;color:#666">Pikafish JavaScript Engine</div>
  </div>
  <div style="height:8px"></div>
  <div style="text-align:center;white-space:nowrap">
    <span class="td" style="margin-right:10px">
      <canvas id="boardCanvas" width="520" height="520"></canvas>
      <div class="status" id="statusText"></div>
    </span>
    <span class="td" style="vertical-align:top;width:120px;">
      <div style="text-align:left">
        <div class="label">谁先走</div>
        <div><select id="selMoveMode" size="3">
          <option selected value="0">我先走</option>
          <option value="1">电脑先走</option>
          <option value="2">不用电脑</option>
        </select></div>
        <div class="label">先走让子</div>
        <div><select id="selHandicap" size="3">
          <option selected value="0">不让子</option>
          <option value="1">让左马</option>
          <option value="2">让双马</option>
          <option value="3">让九子</option>
        </select></div>
        <div style="padding-top:2px">
          <input type="button" class="button" value="重新开始" id="btnRestart">
        </div>
        <div style="padding-top:2px">
          <input type="button" class="button" value="悔棋" id="btnUndo">
        </div>
        <div style="height:12px"></div>
        <div class="label">电脑水平</div>
        <div><select id="selLevel" size="3">
          <option selected value="0">入门</option>
          <option value="1">业余</option>
          <option value="2">专业</option>
        </select></div>
        <div style="height:4px"></div>
        <div class="info" id="searchInfo" style="white-space:pre;font-family:monospace;line-height:1.4;max-height:200px;overflow:auto"></div>
        <div class="info" id="pvInfo" style="white-space:pre;font-family:monospace;line-height:1.4;max-height:120px;overflow:auto;margin-top:2px"></div>
        <div style="height:8px"></div>
        <div><label>
          <input type="checkbox" class="checkbox" id="chkAnimated" checked>
          动画
        </label></div>
        <div><label>
          <input type="checkbox" class="checkbox" id="chkSound" checked>
          音效
        </label></div>
        <div style="height:12px"></div>
        <div class="label">步骤</div>
        <div><select id="selMoveList" size="10" style="font-family:monospace">
          <option selected value="0">=== 开始 ===</option>
        </select></div>
      </div>
    </span>
  </div>

  <script type="module">
    import { Position } from './position.js';
    import Search from './pikafish_search.js';
    import { Board } from './board.js';
    import {
      NO_PIECE, WHITE, BLACK,
      colorOf, typeOf, fileOf, rankOf, makeSquare,
      fromSq, toSq, makeMove, MOVE_NONE,
      VALUE_MATE, VALUE_DRAW,
      ROOK, ADVISOR, CANNON, PAWN, KNIGHT, BISHOP, KING,
    } from './pikafish_types.js';

    // Starting FENs
    const STARTUP_FEN = [
      "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w",
      "r1bakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w",
      "r1bakab1r/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w",
      "1nbakabn1/9/9/p1p1p1p1p/9/9/P1P1P1P1P/9/9/1NBAKABN1 w",
    ];

    // Level times (ms per move)
    const LEVEL_TIMES = [500, 2000, 8000];
    const LEVEL_DEPTHS = [6, 12, 20];

    // DOM elements
    const selMoveMode = document.getElementById('selMoveMode');
    const selHandicap = document.getElementById('selHandicap');
    const selLevel = document.getElementById('selLevel');
    const selMoveList = document.getElementById('selMoveList');
    const btnRestart = document.getElementById('btnRestart');
    const btnUndo = document.getElementById('btnUndo');
    const chkAnimated = document.getElementById('chkAnimated');
    const chkSound = document.getElementById('chkSound');
    const statusText = document.getElementById('statusText');
    const searchInfo = document.getElementById('searchInfo');
    const pvInfo = document.getElementById('pvInfo');

    // Info lines buffer (UCI-style)
    const infoLines = [];
    const VALUE_MATE = 32000;
    const MATE_THRESHOLD = VALUE_MATE - 240; // VALUE_MATE_IN_MAX_PLY
    function formatScore(v) {
      if (v === undefined || v === null) return 'cp 0';
      // Mate scores: positive = side to move wins in N plies
      if (v >= MATE_THRESHOLD) {
        const moves = Math.ceil((VALUE_MATE - v) / 2);
        return 'mate ' + moves;
      }
      if (v <= -MATE_THRESHOLD) {
        const moves = -Math.ceil((VALUE_MATE + v) / 2);
        return 'mate ' + moves;
      }
      return 'cp ' + v;
    }
    function formatInfo(info) {
      // info: {depth, seldepth, score, pv, nodes, nps, time, hashfull, multipv}
      const parts = [];
      parts.push(`深度 ${info.depth}`);
      if (info.seldepth !== undefined) parts.push(`选择深度 ${info.seldepth}`);
      parts.push(`评分 ${formatScore(info.score)}`);
      if (info.time !== undefined) parts.push(`用时 ${info.time}ms`);
      if (info.nodes !== undefined) parts.push(`节点 ${info.nodes.toLocaleString()}`);
      if (info.nps !== undefined && info.nps > 0) parts.push(`NPS ${info.nps.toLocaleString()}`);
      if (info.hashfull !== undefined) parts.push(`TT ${info.hashfull}/1000`);
      return parts.join('  ');
    }
    search.onInfo = (info) => {
      infoLines.push(formatInfo(info));
      if (infoLines.length > 20) infoLines.shift();
      searchInfo.textContent = infoLines.join('\n');
      // Update PV (always show latest full PV)
      if (info.pv && info.pv.length > 0) {
        const pvStr = info.pv.map(m => pos.moveToString(m)).join(' ');
        pvInfo.textContent = `最佳着法: ${pvStr}`;
      } else {
        pvInfo.textContent = '最佳着法: (无)';
      }
    };
    search.onBestMove = (m, v) => {
      infoLines.push('—— 思考完成 ——');
      infoLines.push(`最佳着法: ${m !== undefined && m !== -1 ? pos.moveToString(m) : '(无)'}  评分 ${formatScore(v)}`);
      searchInfo.textContent = infoLines.join('\n');
    };

    // Game state
    const pos = new Position();
    const search = new Search();
    const board = new Board('boardCanvas');

    let history = [];
    let busy = false;
    let selectedSq = -1;
    let gameOver = false;
    let mode = 0;       // 0=player first, 1=computer first, 2=two player
    let level = 0;
    let handicap = 0;

    // Initialize
    function init() {
      mode = parseInt(selMoveMode.value);
      level = parseInt(selLevel.value);
      handicap = parseInt(selHandicap.value);

      pos.set(STARTUP_FEN[handicap] || STARTUP_FEN[0]);
      history = [];
      gameOver = false;
      selectedSq = -1;
      board.clearSelection();
      search.clear();

      selMoveList.innerHTML = '<option selected value="0">=== 开始 ===</option>';
      statusText.textContent = '';
      searchInfo.textContent = '';
      pvInfo.textContent = '';
      infoLines.length = 0;
      updateBoard();

      if (mode === 1) {
        setTimeout(() => computerMove(), 500);
      }
    }

    function updateBoard() {
      const lastMove = history.length > 0 ? history[history.length - 1] : null;
      board.draw(pos, lastMove);
    }

    // Handle canvas click
    board.canvas.addEventListener('click', (e) => {
      if (busy || gameOver) return;
      if (mode !== 2 && pos.sideToMove === BLACK) return;

      const rect = board.canvas.getBoundingClientRect();
      const scaleX = board.canvas.width / rect.width;
      const scaleY = board.canvas.height / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      const sq = board.canvasToBoard(cx, cy);

      if (sq < 0 || sq >= 90) {
        selectedSq = -1;
        board.clearSelection();
        updateBoard();
        return;
      }

      const pc = pos.board[sq];

      if (selectedSq >= 0) {
        const m = makeMove(selectedSq, sq);
        if (pos.isLegalMove(m)) {
          doMakeMove(m);
          selectedSq = -1;
          board.clearSelection();
          return;
        }
        // Select own piece
        if (pc !== NO_PIECE && colorOf(pc) === pos.sideToMove) {
          selectedSq = sq;
          showLegalMoves(sq);
          updateBoard();
          return;
        }
        selectedSq = -1;
        board.clearSelection();
        updateBoard();
        return;
      }

      if (pc !== NO_PIECE && colorOf(pc) === pos.sideToMove) {
        selectedSq = sq;
        showLegalMoves(sq);
        updateBoard();
      }
    });

    function showLegalMoves(sq) {
      const moves = [];
      const allLegal = [];
      pos.generateLegalMoves(allLegal);
      for (const m of allLegal) {
        if (fromSq(m) === sq) moves.push(m);
      }
      board.selectSquare(sq, moves);
    }

    function doMakeMove(m) {
      if (!pos.doMove(m)) return;
      history.push(m);
      addMoveToList(m);
      updateBoard();

      // Check game end
      const legalMoves = [];
      pos.generateLegalMoves(legalMoves);
      if (legalMoves.length === 0) {
        gameOver = true;
        if (pos.inCheck()) {
          const winner = pos.sideToMove === WHITE ? '黑方' : '红方';
          statusText.textContent = winner + '获胜！';
        } else {
          statusText.textContent = '和棋！';
        }
        return;
      }

      // Repetition draw
      if (pos.hasRepetition()) {
        gameOver = true;
        statusText.textContent = '三次重复 - 和棋！';
        return;
      }

      // Computer's turn
      if (mode !== 2 && pos.sideToMove === BLACK && !gameOver) {
        setTimeout(() => computerMove(), 100);
      }
    }

    function addMoveToList(m) {
      const from = fromSq(m), to = toSq(m);
      const fromStr = String.fromCharCode(97 + fileOf(from)) + (9 - rankOf(from));
      const toStr = String.fromCharCode(97 + fileOf(to)) + (9 - rankOf(to));
      const moveStr = fromStr + toStr;

      const opt = document.createElement('option');
      const num = Math.floor(history.length / 2);
      const isRed = history.length % 2 === 1;
      const prefix = isRed ? `  ${num+1}. ` : '     ';
      opt.text = prefix + moveStr;
      opt.value = history.length.toString();
      selMoveList.appendChild(opt);
      selMoveList.selectedIndex = selMoveList.options.length - 1;
      selMoveList.scrollTop = selMoveList.scrollHeight;
    }

    function computerMove() {
      if (busy || gameOver) return;
      busy = true;
      statusText.textContent = '电脑思考中...';
      searchInfo.textContent = '';
      pvInfo.textContent = '';
      infoLines.length = 0;
      updateBoard();

      const timeMs = LEVEL_TIMES[level] || 2000;
      const maxDepth = LEVEL_DEPTHS[level] || 10;

      // Search in an async way using setTimeout
      setTimeout(() => {
        const bestMove = search.search(pos, {
          moveTime: timeMs,
          maxDepth: maxDepth,
        });

        busy = false;
        statusText.textContent = '';

        if (bestMove !== MOVE_NONE) {
          doMakeMove(bestMove);
        }
        updateBoard();
      }, 50);
    }

    function undoMoves(count) {
      for (let i = 0; i < count && history.length > 0; i++) {
        const m = history.pop();
        pos.undoMove(m);
      }
      // Rebuild move list
      selMoveList.innerHTML = '<option selected value="0">=== 开始 ===</option>';
      const savedHistory = [...history];
      history = [];
      for (const m of savedHistory) {
        addMoveToList(m);
      }
      history = savedHistory;
      gameOver = false;
      statusText.textContent = '';
      selectedSq = -1;
      board.clearSelection();
      updateBoard();
    }

    // Button handlers
    btnRestart.addEventListener('click', () => {
      mode = parseInt(selMoveMode.value);
      level = parseInt(selLevel.value);
      handicap = parseInt(selHandicap.value);
      init();
    });

    btnUndo.addEventListener('click', () => {
      if (busy || history.length === 0) return;
      const undoCount = mode !== 2 ? Math.min(2, history.length) : 1;
      undoMoves(undoCount);
    });

    // Level change
    selLevel.addEventListener('change', () => {
      level = parseInt(selLevel.value);
    });

    // Mode change
    selMoveMode.addEventListener('change', () => {
      mode = parseInt(selMoveMode.value);
    });

    // Checkboxes
    chkAnimated.addEventListener('change', () => {
      board.animated = chkAnimated.checked;
    });

    chkSound.addEventListener('change', () => {
      board.setSound(chkSound.checked);
    });

    // Move list selection
    selMoveList.addEventListener('change', () => {
      if (busy || gameOver) return;
      const targetIdx = parseInt(selMoveList.value);
      if (targetIdx === 0) return;

      const currentLen = history.length;
      if (targetIdx < currentLen) {
        // Go back to earlier position
        const undoCount = currentLen - targetIdx;
        undoMoves(undoCount);
      }
    });

    // Start
    init();
  </script>
</body>
</html>
