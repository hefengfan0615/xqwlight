<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>象棋小巫师 - Pikafish-JS</title>

    <!-- Core engine modules, in load order -->
    <script type="text/javascript" src="cchess.js"></script>
    <script type="text/javascript" src="bitboard.js"></script>
    <script type="text/javascript" src="position.js"></script>
    <script type="text/javascript" src="nnue.js"></script>
    <script type="text/javascript" src="movepick.js"></script>
    <script type="text/javascript" src="search.js"></script>
    <script type="text/javascript" src="board.js"></script>

    <style type="text/css">
      body {
        background: url(../background.gif);
        font-family: "Microsoft YaHei", "黑体", sans-serif;
      }
      span.td  { display: inline-block; }
      div.label{ font-size: 14px; padding: 2px; }
      select   { font-size: 14px; width: 108px; padding: 2px; }
      option   { font-size: 14px; }
      input.button { font-size: 14px; width: 108px; }
      label    { font-size: 14px; }

      /* Search info bar at the bottom of the page */
      .search-info {
        margin: 16px auto 0;
        max-width: 720px;
        padding: 10px 14px;
        background: rgba(0, 0, 0, 0.55);
        color: #e6f1ff;
        border-radius: 8px;
        font-family: "Consolas", "Menlo", "Courier New", monospace;
        font-size: 13px;
        line-height: 1.55;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      }
      .search-info .title {
        color: #9ec5fe;
        font-weight: bold;
        margin-bottom: 4px;
      }
      .search-info .row { display: flex; flex-wrap: wrap; gap: 14px; }
      .search-info .row span.k { color: #ffce5b; }
      .search-info .row span.v { color: #f0f0f0; font-weight: bold; }
      .search-info .pv {
        margin-top: 6px;
        word-break: break-all;
        color: #b6f5b6;
      }
    </style>
  </head>
  <body>
    <div style="text-align: center; font-size: 28px; font-family: 黑体">
      象棋小巫师 &mdash; Pikafish-JS
    </div>
    <div style="height: 16px"></div>

    <div style="text-align: center; white-space: nowrap">
      <span class="td" style="margin-right: 10px">
        <div id="container"></div>
      </span>
      <span class="td" style="vertical-align: top; width: 140px;">
        <div style="text-align: left">
          <div class="label">谁先走</div>
          <div>
            <select id="selMoveMode" size="3">
              <option selected value="0">我先走</option>
              <option value="1">电脑先走</option>
              <option value="2">不用电脑</option>
            </select>
          </div>

          <div class="label">先走让子</div>
          <div>
            <select id="selHandicap" style="padding: 0">
              <option selected value="0">不让子</option>
              <option value="1">让左马</option>
              <option value="2">让双马</option>
              <option value="3">让九子</option>
            </select>
          </div>

          <div style="padding-top: 2px">
            <input type="button" class="button" value="重新开始" onclick="restart_click()">
          </div>
          <div style="padding-top: 2px">
            <input type="button" class="button" value="悔棋" onclick="retract_click()">
          </div>

          <div style="height: 12px"></div>
          <div class="label">电脑水平</div>
          <div>
            <select id="selLevel" size="3" onchange="level_change()">
              <option value="0">入门</option>
              <option value="1">业余</option>
              <option selected value="2">专业</option>
            </select>
          </div>

          <div style="height: 12px"></div>
          <div>
            <input type="checkbox" id="chkAnimated" checked
                   onclick="board.animated = checked">
            <label for="chkAnimated">动画</label>
          </div>
          <div>
            <input type="checkbox" id="chkSound" checked
                   onclick="board.setSound(checked)">
            <label for="chkSound">音效</label>
          </div>

          <div style="height: 40px"></div>
          <div class="label">步骤</div>
          <div>
            <select id="selMoveList" size="10" style="font-family: 宋体"
                    onchange="moveList_change()">
              <option selected value="0">=== 开始 ===</option>
            </select>
          </div>
        </div>
      </span>
    </div>

    <!-- Bottom info bar: search depth, score, PV, KNPS -->
    <div class="search-info" id="searchInfo">
      <div class="title">Pikafish-JS 搜索信息</div>
      <div class="row">
        <span><span class="k">深度</span> <span class="v" id="infoDepth">-</span></span>
        <span><span class="k">评分</span> <span class="v" id="infoScore">-</span></span>
        <span><span class="k">节点</span> <span class="v" id="infoNodes">-</span></span>
        <span><span class="k">用时</span> <span class="v" id="infoTime">-</span></span>
        <span><span class="k">KNPS</span> <span class="v" id="infoKNPS">-</span></span>
      </div>
      <div class="pv" id="infoPV">思考路径：等待电脑思考...</div>
    </div>

    <script type="text/javascript">
      "use strict";

      var STARTUP_FEN = [
        "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w",
        "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKAB1R w",
        "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/R1BAKAB1R w",
        "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/9/1C5C1/9/RN2K2NR w"
      ];

      function createOption(text, value) {
        var opt = document.createElement("option");
        opt.selected = true;
        opt.value = value;
        opt.innerHTML = text.replace(/ /g, "&nbsp;");
        return opt;
      }

      var board = new Board(container, "images/", "sounds/");
      board.setSearch(16);                 // 64K transposition-table entries
      board.millis = 8000;                 // 8 seconds per move (professional level)
      board.computer = 1;                  // computer plays BLACK

      board.onAddMove = function () {
        var counter = (board.pos.st.length - 1) >> 1;
        var space = (counter > 99 ? "    " : "   ");
        counter = (counter > 9 ? "" : " ") + counter + ".";
        var text = (board.pos.sideToMove === RED ? space : counter) +
                   moveToIccs(board.mvLast);
        var value = "" + board.mvLast;
        try {
          selMoveList.add(createOption(text, value));
        } catch (e) {
          var opt = document.createElement("option");
          opt.selected = true;
          opt.value = value;
          opt.text = text;
          selMoveList.add(opt);
        }
        selMoveList.scrollTop = selMoveList.scrollHeight;
      };

      // Hook search info to the bottom bar
      board.onInfo = function (info) {
        document.getElementById("infoDepth").textContent = info.depth;
        document.getElementById("infoScore").textContent = formatScore(info.score);
        document.getElementById("infoNodes").textContent = info.nodes.toLocaleString();
        document.getElementById("infoTime").textContent  = (info.time / 1000).toFixed(2) + "s";
        document.getElementById("infoKNPS").textContent  = info.knps.toFixed(1);
        var pvStr = "";
        for (var i = 0; i < info.pv.length; i++) {
          if (!info.pv[i]) break;
          if (i > 0) pvStr += " ";
          pvStr += moveToIccs(info.pv[i]);
        }
        document.getElementById("infoPV").textContent = "思考路径：" + (pvStr || "(无)");
      };

      function level_change() {
        var lvls = [50, 500, 8000, 30000];
        board.millis = lvls[selLevel.selectedIndex] || 8000;
      }

      function restart_click() {
        selMoveList.options.length = 1;
        selMoveList.selectedIndex = 0;
        board.computer = 1 - selMoveMode.selectedIndex;
        board.restart(STARTUP_FEN[selHandicap.selectedIndex]);
      }

      function retract_click() {
        if (board.busy) return;
        if (board.pos.st.length > 2) board.pos.undo_move();
        if (board.pos.st.length > 2 && board.computerMove()) board.pos.undo_move();
        selMoveList.options.length = board.pos.st.length - 1;
        selMoveList.selectedIndex = selMoveList.options.length - 1;
        board.flushBoard();
        board.response();
      }

      function moveList_change() {
        // For now, treat as reset
        selMoveList.selectedIndex = selMoveList.options.length - 1;
      }

      // Trigger initial computer move if applicable
      restart_click();
    </script>
  </body>
</html>
