<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>象棋小巫师 · Pikafish 算法移植版</title>
  <style>
    /* ===== 字体与基础重置 ===== */
    @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;800&family=JetBrains+Mono:wght@400;600&family=ZCOOL+XiaoWei&display=swap");

    :root {
      --ink:        #1a1d23;
      --ink-soft:   #3a3f4b;
      --parchment:  #f4ead5;
      --parchment-2:#e6d6ad;
      --vermilion:  #b13a2f;
      --vermilion-2:#7a1d1d;
      --gold:       #c89f3c;
      --jade:       #2d6a4f;
      --shadow:     0 8px 24px rgba(20, 12, 4, .25);
      --serif:      "Noto Serif SC", "Songti SC", "STSong", serif;
      --mono:       "JetBrains Mono", "SF Mono", Consolas, monospace;
      --display:    "ZCOOL XiaoWei", "Noto Serif SC", serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: var(--serif);
      color: var(--ink);
      background:
        radial-gradient(ellipse at 20% 10%, #f9efd5 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, #e9d39b 0%, transparent 55%),
        linear-gradient(180deg, #f4ead5 0%, #e8d6a6 100%);
      padding: 24px 16px 60px;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, rgba(120, 80, 30, .03) 0 2px, transparent 2px 6px),
        repeating-linear-gradient(90deg, rgba(120, 80, 30, .03) 0 2px, transparent 2px 6px);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
    }

    /* ===== 标题区 ===== */
    .masthead {
      text-align: center;
      margin-bottom: 14px;
    }
    .masthead h1 {
      font-family: var(--display);
      font-size: 44px;
      font-weight: 800;
      letter-spacing: 8px;
      margin: 0;
      color: var(--vermilion);
      text-shadow:
        1px 1px 0 #f9eec9,
        2px 2px 0 #c89f3c,
        3px 3px 0 rgba(120, 30, 20, .35);
    }
    .masthead .sub {
      margin-top: 6px;
      font-size: 14px;
      color: var(--ink-soft);
      letter-spacing: 2px;
    }
    .masthead .sub em {
      font-style: normal;
      color: var(--vermilion-2);
      font-weight: 600;
    }

    /* ===== 主区棋盘 + 侧栏 ===== */
    .stage {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: wrap;
    }

    #container {
      position: relative;
      border: 6px solid #5a3a1e;
      border-radius: 6px;
      box-shadow: var(--shadow), inset 0 0 0 1px #c89f3c;
      background: #efd9a7;
    }

    .panel {
      background: linear-gradient(180deg, #faf2dc 0%, #ecdbb1 100%);
      border: 2px solid #8a6230;
      border-radius: 6px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
      min-width: 138px;
    }
    .panel h2 {
      font-family: var(--display);
      font-size: 16px;
      letter-spacing: 3px;
      color: var(--vermilion);
      margin: 0 0 8px;
      border-bottom: 1px dashed #b08a55;
      padding-bottom: 4px;
    }
    .panel .label {
      font-size: 13px;
      color: var(--ink-soft);
      margin: 6px 0 4px;
    }
    .panel select, .panel input.button {
      width: 100%;
      font-size: 13px;
      font-family: var(--serif);
      padding: 4px 6px;
      background: #fff8e6;
      border: 1px solid #b08a55;
      border-radius: 3px;
      color: var(--ink);
    }
    .panel input.button {
      cursor: pointer;
      background: linear-gradient(180deg, #f4dd9c 0%, #d9b56a 100%);
      font-weight: 600;
      margin-top: 4px;
    }
    .panel input.button:hover { background: linear-gradient(180deg, #ffe6a3 0%, #e5c277 100%); }
    .panel input.button:active { transform: translateY(1px); }

    .panel select { height: auto; }
    #selMoveMode, #selHandicap, #selLevel { padding: 2px; }
    .panel .chk-row { font-size: 12px; color: var(--ink-soft); margin: 3px 0; }

    #selMoveList {
      width: 100%;
      font-family: var(--mono);
      font-size: 12px;
      background: #fff8e6;
      border: 1px solid #b08a55;
      border-radius: 3px;
    }

    /* ===== 底部引擎信息面板 ===== */
    .engine-info {
      margin: 26px auto 0;
      max-width: 880px;
      background:
        linear-gradient(180deg, #1f2330 0%, #15171f 100%);
      border-radius: 10px;
      padding: 16px 20px;
      box-shadow:
        0 12px 32px rgba(20, 12, 4, .35),
        inset 0 0 0 1px rgba(200, 159, 60, .3);
      color: #e6e2d0;
      font-family: var(--mono);
      opacity: .55;
      transition: opacity .25s ease;
    }
    .engine-info.active { opacity: 1; }

    .engine-info .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .engine-info .header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold);
    }
    .engine-info .header .label {
      font-family: var(--display);
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--gold);
    }
    .engine-info .header .badge {
      margin-left: auto;
      font-size: 10px;
      letter-spacing: 1px;
      color: #8a8a8a;
      border: 1px solid #555;
      padding: 2px 6px;
      border-radius: 8px;
    }

    .engine-info .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px 14px;
    }
    .engine-info .cell {
      background: rgba(255, 255, 255, .04);
      border-left: 2px solid var(--gold);
      padding: 6px 10px;
      border-radius: 0 4px 4px 0;
    }
    .engine-info .cell .k {
      font-size: 10px;
      letter-spacing: 2px;
      color: #a89878;
      text-transform: uppercase;
    }
    .engine-info .cell .v {
      font-size: 16px;
      font-weight: 600;
      color: #f4ead5;
      margin-top: 2px;
      word-break: break-all;
    }
    .engine-info .cell.score .v.positive { color: #7dd87d; }
    .engine-info .cell.score .v.negative { color: #ff8a7a; }
    .engine-info .cell.pv {
      grid-column: 1 / -1;
    }
    .engine-info .cell.pv .v {
      font-size: 13px;
      line-height: 1.6;
      letter-spacing: 1px;
    }

    @media (max-width: 720px) {
      .engine-info .grid { grid-template-columns: repeat(2, 1fr); }
      .masthead h1 { font-size: 32px; letter-spacing: 4px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="masthead">
      <h1>象棋小巫师</h1>
      <div class="sub">基于 <em>Pikafish</em> 算法移植 · MovePicker · α-β · Quiescence · PV</div>
    </div>

    <div class="stage">
      <span style="display:inline-block">
        <div id="container"></div>
      </span>
      <span class="panel" style="vertical-align:top;width:170px;">
        <h2>设置</h2>
        <div class="label">谁先走</div>
        <div><select id="selMoveMode" size="3">
          <option selected value="0">我先走</option>
          <option value="1">电脑先走</option>
          <option value="2">不用电脑</option>
        </select></div>

        <div class="label">先走让子</div>
        <div><select id="selHandicap" style="padding:0px">
          <option selected value="0">不让子</option>
          <option value="1">让左马</option>
          <option value="2">让双马</option>
          <option value="3">让九子</option>
        </select></div>

        <div style="margin-top:6px"><input type="button" class="button" value="重新开始" onclick="restart_click()"></div>
        <div style="margin-top:4px"><input type="button" class="button" value="悔棋" onclick="retract_click()"></div>

        <div class="label" style="margin-top:10px">电脑水平</div>
        <div><select id="selLevel" size="4" onchange="level_change()">
          <option value="0">入门 (0.5s)</option>
          <option value="1">业余 (1.5s)</option>
          <option selected value="2">专业 (5s)</option>
          <option value="3">大师 (15s)</option>
        </select></div>

        <div class="chk-row"><input type="checkbox" id="chkAnimated" checked onclick="board.animated = checked"><label for="chkAnimated">动画</label></div>
        <div class="chk-row"><input type="checkbox" id="chkSound" checked onclick="board.setSound(checked)"><label for="chkSound">音效</label></div>
      </span>
      <span class="panel" style="vertical-align:top;width:170px;">
        <h2>步骤</h2>
        <div><select id="selMoveList" size="20" style="font-family:'JetBrains Mono',monospace" onchange="moveList_change()">
          <option selected value="0">=== 开始 ===</option>
        </select></div>
      </span>
    </div>

    <!-- ============ 引擎信息面板 ============ -->
    <div id="info" class="engine-info">
      <div class="header">
        <span class="dot"></span>
        <span class="label">ENGINE INFO</span>
        <span class="badge">Pikafish-style · α-β + Quiescence</span>
      </div>
      <div class="grid">
        <div class="cell">
          <div class="k">深度 Depth</div>
          <div class="v" id="info-depth">—</div>
        </div>
        <div class="cell score">
          <div class="k">评分 Score</div>
          <div class="v" id="info-score">—</div>
        </div>
        <div class="cell">
          <div class="k">节点 Nodes</div>
          <div class="v" id="info-nodes">—</div>
        </div>
        <div class="cell">
          <div class="k">耗时 Time</div>
          <div class="v" id="info-time">—</div>
        </div>
        <div class="cell">
          <div class="k">NPS</div>
          <div class="v" id="info-nps">—</div>
        </div>
        <div class="cell">
          <div class="k">KNPS</div>
          <div class="v" id="info-knps">—</div>
        </div>
        <div class="cell pv">
          <div class="k">主变 PV (Principal Variation)</div>
          <div class="v" id="info-pv">等待搜索…</div>
        </div>
      </div>
    </div>
  </div>
  <!-- 经典脚本：注入 BOOK_DAT 到 window；模块脚本在容器渲染后执行 -->
  <script src="book.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
